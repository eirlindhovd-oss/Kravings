  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"no\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Kravings<\u002Ftitle>\n    <style>\n        :root {\n            --green-dark:    #d8460e;  /* mørkere oransje – hover */\n            --green-primary: #ff5c1a;  /* hovedaksent – samme som header */\n            --green-light:   #ffe0d0;  /* lys fersken – header-undertekst */\n            --cream:         #fbf5ef;  /* varm off-white bakgrunn */\n            --cream-dark:    #ece0d5;  /* varm kantlinje */\n            --yellow:        #e9c46a;\n            --white:         #ffffff;\n            --text-dark:     #2a211b;  /* varm nær-svart */\n            --text-muted:    #8c7b6f;  /* varm grå */\n            --error-bg:      #fdecea;\n            --error-fg:      #b91c1c;\n            --success-bg:    #fff1e8;  /* varm bekreftelse-bakgrunn */\n            --success-fg:    #b8430e;  /* varm bekreftelse-tekst */\n        }\n\n        * { margin: 0; padding: 0; box-sizing: border-box; }\n\n        body {\n            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n            background: var(--cream);\n            min-height: 100vh;\n            color: var(--text-dark);\n        }\n\n        /* ── Header ─────────────────────────────────────────── */\n        header {\n            padding: 26px 20px 10px;\n            text-align: center;\n        }\n\n        header h1 {\n            font-size: 36px;\n            font-weight: 700;\n            line-height: 1.1;\n            color: #FF5C1A;\n        }\n\n        header p {\n            margin-top: 6px;\n            font-size: 13px;\n            color: #888;\n        }\n\n        /* ── Layout ──────────────────────────────────────────── */\n        .container {\n            max-width: 640px;\n            margin: 0 auto;\n            padding: 24px 16px 48px;\n        }\n\n        /* ── Message banner ──────────────────────────────────── */\n        #message {\n            display: none;\n            padding: 11px 16px;\n            border-radius: 8px;\n            font-size: 0.9em;\n            font-weight: 500;\n            margin-bottom: 16px;\n        }\n\n        #message.error   { display: block; background: var(--error-bg);   color: var(--error-fg); }\n        #message.success { display: block; background: var(--success-bg); color: var(--success-fg); }\n\n        /* ── Top-3 (innkjøpsansvarlig) ───────────────────────── */\n        .top3-section {\n            background: #FFF0EA;\n            border: 0.5px solid #FFCFB8;\n            border-radius: 12px;\n            padding: 1rem 1.25rem;\n            margin-bottom: 20px;\n        }\n\n        .top3-section h2 {\n            font-size: 12px;\n            font-weight: 600;\n            text-transform: none;\n            letter-spacing: normal;\n            color: #FF5C1A;\n            margin-bottom: 10px;\n        }\n\n        .top3-list { display: flex; flex-direction: column; gap: 0; }\n\n        .top3-item {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            background: #FFFFFF;\n            padding: 8px 12px;\n            border-radius: 8px;\n            margin-bottom: 6px;\n        }\n\n        .top3-item:last-child { margin-bottom: 0; }\n\n        .top3-item.rank-1,\n        .top3-item.rank-2,\n        .top3-item.rank-3 { background: #FFFFFF; border-left: none; }\n\n        .top3-rank  { font-weight: 600; font-size: 13px; min-width: 16px; color: #FF5C1A; }\n        .top3-name  { flex: 1; font-weight: 500; font-size: 14px; color: #1A1A1A; }\n        .top3-votes {\n            background: #FF5C1A;\n            color: #FFFFFF;\n            font-size: 12px;\n            font-weight: 500;\n            border-radius: 20px;\n            padding: 3px 10px;\n            white-space: nowrap;\n        }\n\n        .top3-empty {\n            text-align: center;\n            color: var(--text-muted);\n            font-size: 0.88em;\n            padding: 6px 0;\n        }\n\n        /* ── Input form ──────────────────────────────────────── */\n        .form-section {\n            background: var(--white);\n            padding: 18px 20px;\n            border-radius: 12px;\n            box-shadow: 0 2px 8px rgba(0,0,0,0.06);\n            margin-bottom: 20px;\n        }\n\n        .form-section label {\n            display: block;\n            font-size: 0.72em;\n            font-weight: 700;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n            color: var(--text-muted);\n            margin-bottom: 9px;\n        }\n\n        .form-group { display: flex; gap: 8px; }\n\n        input[type=\"text\"] {\n            flex: 1;\n            height: 36px;\n            padding: 0 12px;\n            border: 0.5px solid #CCCCCC;\n            border-radius: 8px;\n            font-size: 14px;\n            background: var(--white);\n            color: var(--text-dark);\n            transition: border-color 0.2s;\n        }\n\n        input[type=\"text\"]:focus {\n            outline: none;\n            border-color: #FF5C1A;\n        }\n\n        button.primary {\n            height: 36px;\n            padding: 0 16px;\n            background: #FF5C1A;\n            color: #FFFFFF;\n            border: none;\n            border-radius: 8px;\n            font-size: 14px;\n            font-weight: 600;\n            cursor: pointer;\n            transition: background 0.2s, transform 0.1s;\n            white-space: nowrap;\n        }\n\n        button.primary:hover  { background: var(--green-dark); }\n        button.primary:active { transform: scale(0.97); }\n\n        /* ── Suggestions list ────────────────────────────────── */\n        .section-label {\n            font-size: 0.72em;\n            font-weight: 700;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n            color: var(--green-primary);\n            margin-bottom: 10px;\n        }\n\n        .suggestions-section {\n            display: flex;\n            flex-direction: column;\n            background: #FFFFFF;\n            border: 0.5px solid #EBEBEB;\n            border-radius: 12px;\n            padding: 0 1.25rem;\n        }\n\n        .suggestion {\n            display: flex;\n            align-items: center;\n            gap: 12px;\n            padding: 11px 0;\n            border-bottom: 0.5px solid #EBEBEB;\n        }\n\n        .suggestion:last-child { border-bottom: none; }\n\n        .suggestion-name {\n            flex: 1;\n            font-size: 14px;\n            font-weight: 400;\n            color: #1A1A1A;\n        }\n\n        .vote-section { display: flex; align-items: center; gap: 0; }\n\n        .vote-count {\n            font-size: 13px;\n            color: #888;\n            margin-right: 8px;\n        }\n\n        button.vote-btn {\n            display: inline-flex;\n            align-items: center;\n            gap: 5px;\n            height: 30px;\n            padding: 0 12px;\n            background: transparent;\n            color: #555;\n            border: 0.5px solid #CCCCCC;\n            border-radius: 20px;\n            font-size: 13px;\n            font-weight: 500;\n            cursor: pointer;\n            transition: border-color 0.2s, color 0.2s;\n        }\n\n        button.vote-btn .vote-arrow { width: 11px; height: 11px; }\n\n        button.vote-btn:active  { transform: scale(0.97); }\n\n        button.vote-btn.voted {\n            background: transparent;\n            border-color: #FF5C1A;\n            color: #FF5C1A;\n            cursor: pointer;\n        }\n\n        button.vote-btn.voted:hover {\n            background: transparent;\n            color: #FF5C1A;\n        }\n\n        button.delete-btn {\n            padding: 5px 8px;\n            background: transparent;\n            color: #ccc;\n            border: none;\n            border-radius: 6px;\n            font-size: 18px;\n            line-height: 1;\n            cursor: pointer;\n            transition: color 0.2s, background 0.2s;\n            flex-shrink: 0;\n        }\n\n        button.delete-btn:hover {\n            background: var(--error-bg);\n            color: var(--error-fg);\n        }\n\n        /* ── States ──────────────────────────────────────────── */\n        .loading, .empty-state {\n            text-align: center;\n            color: var(--text-muted);\n            padding: 36px 20px;\n            font-size: 15px;\n        }\n\n        .spinner {\n            display: inline-block;\n            width: 18px;\n            height: 18px;\n            border: 2px solid var(--cream-dark);\n            border-top-color: var(--green-primary);\n            border-radius: 50%;\n            animation: spin 0.7s linear infinite;\n            vertical-align: middle;\n            margin-right: 8px;\n        }\n\n        @keyframes spin { to { transform: rotate(360deg); } }\n    <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<header>\n    <h1>Kravings<\u002Fh1>\n    <p>Lunsjønskeliste for Kravia AS<\u002Fp>\n<\u002Fheader>\n\n<div class=\"container\">\n    <div id=\"message\"><\u002Fdiv>\n\n    <!-- Topp 3 — for innkjøpsansvarlig -->\n    <div class=\"top3-section\">\n        <h2>Ukens favoritter<\u002Fh2>\n        <div class=\"top3-list\" id=\"top3List\">\n            <div class=\"top3-empty\">Laster...<\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Foreslå matvare -->\n    <div class=\"form-section\">\n        <label for=\"foodInput\">Hva savner du?<\u002Flabel>\n        <div class=\"form-group\">\n            <input type=\"text\" id=\"foodInput\" placeholder=\"Skriv dine ønsker\" autocomplete=\"off\" maxlength=\"100\">\n            <button class=\"primary\" id=\"addBtn\" onclick=\"addSuggestion()\">Legg til<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Alle forslag -->\n    <div class=\"section-label\">Ønskelisten<\u002Fdiv>\n    <div id=\"suggestions\" class=\"suggestions-section\">\n        <div class=\"loading\"><span class=\"spinner\"><\u002Fspan>Laster...<\u002Fdiv>\n    <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"2cdc8b30-8629-4f6d-9382-ac377a49c4b9\"><\u002Fscript>\n<script>\n    const PROJECT_URL = \"https://cstcniiidjrcdnkaodym.supabase.co\";\n    const ANON_KEY    = \"sb_publishable_qQmG0CsjmMRNZ4HduPJBKQ_Q9cZOoi2\";\n\n    const { createClient } = window.supabase;\n    const db = createClient(PROJECT_URL, ANON_KEY);\n\n    let suggestions = [];\n\n    /* ── Data ───────────────────────────────────────────────── */\n\n    async function loadSuggestions() {\n        try {\n            const { data, error } = await db\n                .from('wishes')\n                .select('id, product_name, votes')\n                .order('votes', { ascending: false });\n\n            if (error) throw error;\n            suggestions = data || [];\n            renderTop3();\n            renderSuggestions();\n        } catch (err) {\n            showMessage('Kunne ikke laste forslag: ' + err.message, 'error');\n        }\n    }\n\n    async function addSuggestion() {\n        const input = document.getElementById('foodInput');\n        const btn   = document.getElementById('addBtn');\n        const food  = input.value.trim();\n\n        if (!food) {\n            showMessage('Skriv inn en matvare', 'error');\n            return;\n        }\n\n        btn.disabled = true;\n        try {\n            const { error } = await db\n                .from('wishes')\n                .insert({ product_name: food, votes: 0 });\n\n            if (error) throw error;\n            input.value = '';\n            showMessage('Forslag lagt til!', 'success');\n            await loadSuggestions();\n        } catch (err) {\n            showMessage('Feil: ' + err.message, 'error');\n        } finally {\n            btn.disabled = false;\n        }\n    }\n\n    async function vote(id) {\n        const s = suggestions.find(x => x.id === id);\n        if (!s) return;\n\n        try {\n            const { error } = await db\n                .from('wishes')\n                .update({ votes: s.votes + 1 })\n                .eq('id', id);\n\n            if (error) throw error;\n            localStorage.setItem('vote_' + id, 'true');\n            showMessage('Takk for stemmen!', 'success');\n            await loadSuggestions();\n        } catch (err) {\n            showMessage('Feil ved stemming: ' + err.message, 'error');\n        }\n    }\n\n    async function unvote(id) {\n        const s = suggestions.find(x => x.id === id);\n        if (!s) return;\n\n        try {\n            const { error } = await db\n                .from('wishes')\n                .update({ votes: Math.max(0, s.votes - 1) })\n                .eq('id', id);\n\n            if (error) throw error;\n            localStorage.removeItem('vote_' + id);\n            showMessage('Stemme fjernet', 'success');\n            await loadSuggestions();\n        } catch (err) {\n            showMessage('Feil: ' + err.message, 'error');\n        }\n    }\n\n    async function deleteSuggestion(id) {\n        try {\n            const { error } = await db\n                .from('wishes')\n                .delete()\n                .eq('id', id);\n\n            if (error) throw error;\n            localStorage.removeItem('vote_' + id);\n            await loadSuggestions();\n        } catch (err) {\n            showMessage('Feil ved sletting: ' + err.message, 'error');\n        }\n    }\n\n    /* ── Render ─────────────────────────────────────────────── */\n\n    function renderTop3() {\n        const container = document.getElementById('top3List');\n        const top = suggestions.slice(0, 3);\n\n        if (top.length === 0) {\n            container.innerHTML = '<div class=\"top3-empty\">Ingen forslag ennå<\u002Fdiv>';\n            return;\n        }\n\n        const ranks   = ['1.', '2.', '3.'];\n        const classes = ['rank-1', 'rank-2', 'rank-3'];\n\n        container.innerHTML = top.map((s, i) => `\n            <div class=\"top3-item ${classes[i]}\">\n                <span class=\"top3-rank\">${ranks[i]}<\u002Fspan>\n                <span class=\"top3-name\">${esc(s.product_name)}<\u002Fspan>\n                <span class=\"top3-votes\">${s.votes} stemmer<\u002Fspan>\n            <\u002Fdiv>\n        `).join('');\n    }\n\n    function renderSuggestions() {\n        const container = document.getElementById('suggestions');\n\n        if (suggestions.length === 0) {\n            container.innerHTML = '<div class=\"empty-state\">Ingen forslag ennå — vær den første!<\u002Fdiv>';\n            return;\n        }\n\n        // FLIP – FIRST: lagre posisjonen til hvert eksisterende element før re-render\n        const firstTops = {};\n        container.querySelectorAll('.suggestion').forEach(el => {\n            firstTops[el.dataset.id] = el.getBoundingClientRect().top;\n        });\n\n        container.innerHTML = suggestions.map(s => {\n            const hasVoted = localStorage.getItem('vote_' + s.id) === 'true';\n            return `\n                <div class=\"suggestion\" data-id=\"${s.id}\">\n                    <div class=\"suggestion-name\">${esc(s.product_name)}<\u002Fdiv>\n                    <div class=\"vote-section\">\n                        <div class=\"vote-count\">${s.votes}<\u002Fdiv>\n                        <button\n                            class=\"vote-btn${hasVoted ? ' voted' : ''}\"\n                            onclick=\"${hasVoted ? `unvote('${s.id}')` : `vote('${s.id}')`}\"\n                        ><svg class=\"vote-arrow\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 19V5M5 12l7-7 7 7\"/><\u002Fsvg>${hasVoted ? 'Stemt' : 'Stem'}<\u002Fbutton>\n                        <button\n                            class=\"delete-btn\"\n                            onclick=\"deleteSuggestion('${s.id}')\"\n                            title=\"Slett forslag\"\n                        >×<\u002Fbutton>\n                    <\u002Fdiv>\n                <\u002Fdiv>\n            `;\n        }).join('');\n\n        // FLIP – LAST / INVERT / PLAY: mål ny posisjon, regn ut differansen og animer\n        container.querySelectorAll('.suggestion').forEach(el => {\n            const firstTop = firstTops[el.dataset.id];\n            if (firstTop === undefined) return; // nytt element – ingen flytteanimasjon\n            const delta = firstTop - el.getBoundingClientRect().top;\n            if (delta) {\n                el.animate(\n                    [{ transform: `translateY(${delta}px)` }, { transform: 'translateY(0)' }],\n                    { duration: 300, easing: 'ease-out' }\n                );\n            }\n        });\n    }\n\n    /* ── Helpers ────────────────────────────────────────────── */\n\n    let _msgTimer = null;\n\n    function showMessage(text, type) {\n        const el = document.getElementById('message');\n        el.textContent = text;\n        el.className = type;\n        clearTimeout(_msgTimer);\n        _msgTimer = setTimeout(() => {\n            el.textContent = '';\n            el.className = '';\n        }, 3500);\n    }\n\n    function esc(text) {\n        const d = document.createElement('div');\n        d.textContent = text;\n        return d.innerHTML;\n    }\n\n    /* ── Init ───────────────────────────────────────────────── */\n\n    loadSuggestions();\n    setInterval(loadSuggestions, 30000);\n\n    document.getElementById('foodInput').addEventListener('keydown', e => {\n        if (e.key === 'Enter') addSuggestion();\n    });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>

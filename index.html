<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kravings</title>
    <style>
        :root {
            --green-dark:    #d8460e;  /* mørkere oransje – hover */
            --green-primary: #ff5c1a;  /* hovedaksent – samme som header */
            --green-light:   #ffe0d0;  /* lys fersken – header-undertekst */
            --cream:         #fbf5ef;  /* varm off-white bakgrunn */
            --cream-dark:    #ece0d5;  /* varm kantlinje */
            --yellow:        #e9c46a;
            --white:         #ffffff;
            --text-dark:     #2a211b;  /* varm nær-svart */
            --text-muted:    #8c7b6f;  /* varm grå */
            --error-bg:      #fdecea;
            --error-fg:      #b91c1c;
            --success-bg:    #fff1e8;  /* varm bekreftelse-bakgrunn */
            --success-fg:    #b8430e;  /* varm bekreftelse-tekst */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--cream);
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* ── Header ─────────────────────────────────────────── */
        header {
            padding: 26px 20px 10px;
            text-align: center;
        }

        header h1 {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.1;
            color: #FF5C1A;
        }

        header p {
            margin-top: 6px;
            font-size: 13px;
            color: #888;
        }

        /* ── Layout ──────────────────────────────────────────── */
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        /* ── Message banner ──────────────────────────────────── */
        #message {
            display: none;
            padding: 11px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            margin-bottom: 16px;
        }

        #message.error   { display: block; background: var(--error-bg);   color: var(--error-fg); }
        #message.success { display: block; background: var(--success-bg); color: var(--success-fg); }

        /* ── Top-3 (innkjøpsansvarlig) ───────────────────────── */
        .top3-section {
            background: #FFF0EA;
            border: 0.5px solid #FFCFB8;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 20px;
        }

        .top3-section h2 {
            font-size: 12px;
            font-weight: 600;
            text-transform: none;
            letter-spacing: normal;
            color: #FF5C1A;
            margin-bottom: 10px;
        }

        .top3-list { display: flex; flex-direction: column; gap: 0; }

        .top3-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #FFFFFF;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .top3-item:last-child { margin-bottom: 0; }

        .top3-item.rank-1,
        .top3-item.rank-2,
        .top3-item.rank-3 { background: #FFFFFF; border-left: none; }

        .top3-rank  { font-weight: 600; font-size: 13px; min-width: 16px; color: #FF5C1A; }
        .top3-name  { flex: 1; font-weight: 500; font-size: 14px; color: #1A1A1A; }
        .top3-votes {
            background: #FF5C1A;
            color: #FFFFFF;
            font-size: 12px;
            font-weight: 500;
            border-radius: 20px;
            padding: 3px 10px;
            white-space: nowrap;
        }

        .top3-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.88em;
            padding: 6px 0;
        }

        /* ── Input form ──────────────────────────────────────── */
        .form-section {
            background: var(--white);
            padding: 18px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .form-section label {
            display: block;
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 9px;
        }

        .form-group { display: flex; gap: 8px; }

        input[type="text"] {
            flex: 1;
            height: 36px;
            padding: 0 12px;
            border: 0.5px solid #CCCCCC;
            border-radius: 8px;
            font-size: 14px;
            background: var(--white);
            color: var(--text-dark);
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #FF5C1A;
        }

        button.primary {
            height: 36px;
            padding: 0 16px;
            background: #FF5C1A;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        button.primary:hover  { background: var(--green-dark); }
        button.primary:active { transform: scale(0.97); }

        /* ── Suggestions list ────────────────────────────────── */
        .section-label {
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--green-primary);
            margin-bottom: 10px;
        }

        .suggestions-section {
            display: flex;
            flex-direction: column;
            background: #FFFFFF;
            border: 0.5px solid #EBEBEB;
            border-radius: 12px;
            padding: 0 1.25rem;
        }

        .suggestion {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 0;
            border-bottom: 0.5px solid #EBEBEB;
        }

        .suggestion:last-child { border-bottom: none; }

        .suggestion-name {
            flex: 1;
            font-size: 14px;
            font-weight: 400;
            color: #1A1A1A;
        }

        .vote-section { display: flex; align-items: center; gap: 0; }

        .vote-count {
            font-size: 13px;
            color: #888;
            margin-right: 8px;
        }

        button.vote-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 30px;
            padding: 0 12px;
            background: transparent;
            color: #555;
            border: 0.5px solid #CCCCCC;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        button.vote-btn .vote-arrow { width: 11px; height: 11px; }

        button.vote-btn:active  { transform: scale(0.97); }

        button.vote-btn.voted {
            background: transparent;
            border-color: #FF5C1A;
            color: #FF5C1A;
            cursor: pointer;
        }

        button.vote-btn.voted:hover {
            background: transparent;
            color: #FF5C1A;
        }

        button.delete-btn {
            padding: 5px 8px;
            background: transparent;
            color: #ccc;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        button.delete-btn:hover {
            background: var(--error-bg);
            color: var(--error-fg);
        }

        /* ── States ──────────────────────────────────────────── */
        .loading, .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 36px 20px;
            font-size: 15px;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--cream-dark);
            border-top-color: var(--green-primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>Kravings</h1>
    <p>Lunsjønskeliste for Kravia AS</p>
</header>

<div class="container">
    <div id="message"></div>

    <!-- Topp 3 — for innkjøpsansvarlig -->
    <div class="top3-section">
        <h2>Ukens favoritter</h2>
        <div class="top3-list" id="top3List">
            <div class="top3-empty">Laster...</div>
        </div>
    </div>

    <!-- Foreslå matvare -->
    <div class="form-section">
        <label for="foodInput">Hva savner du?</label>
        <div class="form-group">
            <input
                type="text"
                id="foodInput"
                placeholder="Skriv dine ønsker"
                autocomplete="off"
                maxlength="100"
            >
            <button class="primary" id="addBtn" onclick="addSuggestion()">Legg til</button>
        </div>
    </div>

    <!-- Alle forslag -->
    <div class="section-label">Ønskelisten</div>
    <div id="suggestions" class="suggestions-section">
        <div class="loading"><span class="spinner"></span>Laster...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const PROJECT_URL = "https://cstcniiidjrcdnkaodym.supabase.co";
    const ANON_KEY    = "sb_publishable_qQmG0CsjmMRNZ4HduPJBKQ_Q9cZOoi2";

    const { createClient } = window.supabase;
    const db = createClient(PROJECT_URL, ANON_KEY);

    let suggestions = [];

    /* ── Data ───────────────────────────────────────────────── */

    async function loadSuggestions() {
        try {
            const { data, error } = await db
                .from('wishes')
                .select('id, product_name, votes')
                .order('votes', { ascending: false });

            if (error) throw error;
            suggestions = data || [];
            renderTop3();
            renderSuggestions();
        } catch (err) {
            showMessage('Kunne ikke laste forslag: ' + err.message, 'error');
        }
    }

    async function addSuggestion() {
        const input = document.getElementById('foodInput');
        const btn   = document.getElementById('addBtn');
        const food  = input.value.trim();

        if (!food) {
            showMessage('Skriv inn en matvare', 'error');
            return;
        }

        btn.disabled = true;
        try {
            const { error } = await db
                .from('wishes')
                .insert({ product_name: food, votes: 0 });

            if (error) throw error;
            input.value = '';
            showMessage('Forslag lagt til!', 'success');
            await loadSuggestions();
        } catch (err) {
            showMessage('Feil: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
        }
    }

    async function vote(id) {
        const s = suggestions.find(x => x.id === id);
        if (!s) return;

        try {
            const { error } = await db
                .from('wishes')
                .update({ votes: s.votes + 1 })
                .eq('id', id);

            if (error) throw error;
            localStorage.setItem('vote_' + id, 'true');
            showMessage('Takk for stemmen!', 'success');
            await loadSuggestions();
        } catch (err) {
            showMessage('Feil ved stemming: ' + err.message, 'error');
        }
    }

    async function unvote(id) {
        const s = suggestions.find(x => x.id === id);
        if (!s) return;

        try {
            const { error } = await db
                .from('wishes')
                .update({ votes: Math.max(0, s.votes - 1) })
                .eq('id', id);

            if (error) throw error;
            localStorage.removeItem('vote_' + id);
            showMessage('Stemme fjernet', 'success');
            await loadSuggestions();
        } catch (err) {
            showMessage('Feil: ' + err.message, 'error');
        }
    }

    async function deleteSuggestion(id) {
        try {
            const { error } = await db
                .from('wishes')
                .delete()
                .eq('id', id);

            if (error) throw error;
            localStorage.removeItem('vote_' + id);
            await loadSuggestions();
        } catch (err) {
            showMessage('Feil ved sletting: ' + err.message, 'error');
        }
    }

    /* ── Render ─────────────────────────────────────────────── */

    function renderTop3() {
        const container = document.getElementById('top3List');
        const top = suggestions.slice(0, 3);

        if (top.length === 0) {
            container.innerHTML = '<div class="top3-empty">Ingen forslag ennå</div>';
            return;
        }

        const ranks   = ['1.', '2.', '3.'];
        const classes = ['rank-1', 'rank-2', 'rank-3'];

        container.innerHTML = top.map((s, i) => `
            <div class="top3-item ${classes[i]}">
                <span class="top3-rank">${ranks[i]}</span>
                <span class="top3-name">${esc(s.product_name)}</span>
                <span class="top3-votes">${s.votes} stemmer</span>
            </div>
        `).join('');
    }

    function renderSuggestions() {
        const container = document.getElementById('suggestions');

        if (suggestions.length === 0) {
            container.innerHTML = '<div class="empty-state">Ingen forslag ennå — vær den første!</div>';
            return;
        }

        // FLIP – FIRST: lagre posisjonen til hvert eksisterende element før re-render
        const firstTops = {};
        container.querySelectorAll('.suggestion').forEach(el => {
            firstTops[el.dataset.id] = el.getBoundingClientRect().top;
        });

        container.innerHTML = suggestions.map(s => {
            const hasVoted = localStorage.getItem('vote_' + s.id) === 'true';
            return `
                <div class="suggestion" data-id="${s.id}">
                    <div class="suggestion-name">${esc(s.product_name)}</div>
                    <div class="vote-section">
                        <div class="vote-count">${s.votes}</div>
                        <button
                            class="vote-btn${hasVoted ? ' voted' : ''}"
                            onclick="${hasVoted ? `unvote('${s.id}')` : `vote('${s.id}')`}"
                        ><svg class="vote-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>${hasVoted ? 'Stemt' : 'Stem'}</button>
                        <button
                            class="delete-btn"
                            onclick="deleteSuggestion('${s.id}')"
                            title="Slett forslag"
                        >×</button>
                    </div>
                </div>
            `;
        }).join('');

        // FLIP – LAST / INVERT / PLAY: mål ny posisjon, regn ut differansen og animer
        container.querySelectorAll('.suggestion').forEach(el => {
            const firstTop = firstTops[el.dataset.id];
            if (firstTop === undefined) return; // nytt element – ingen flytteanimasjon
            const delta = firstTop - el.getBoundingClientRect().top;
            if (delta) {
                el.animate(
                    [{ transform: `translateY(${delta}px)` }, { transform: 'translateY(0)' }],
                    { duration: 300, easing: 'ease-out' }
                );
            }
        });
    }

    /* ── Helpers ────────────────────────────────────────────── */

    let _msgTimer = null;

    function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = type;
        clearTimeout(_msgTimer);
        _msgTimer = setTimeout(() => {
            el.textContent = '';
            el.className = '';
        }, 3500);
    }

    function esc(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    /* ── Init ───────────────────────────────────────────────── */

    loadSuggestions();
    setInterval(loadSuggestions, 30000);

    document.getElementById('foodInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addSuggestion();
    });
</script>

</body>
</html>

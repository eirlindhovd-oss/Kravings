<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purreløken</title>
    <style>
        :root {
            --green-dark:    #1a4731;
            --green-primary: #2d6a4f;
            --green-light:   #52b788;
            --cream:         #f5f0e0;
            --cream-dark:    #e8e1cb;
            --yellow:        #e9c46a;
            --white:         #ffffff;
            --text-dark:     #1a1a1a;
            --text-muted:    #666;
            --error-bg:      #fdecea;
            --error-fg:      #b91c1c;
            --success-bg:    #ecfdf5;
            --success-fg:    #166534;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--cream);
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* ── Header ─────────────────────────────────────────── */
        header {
            background: var(--green-dark);
            color: white;
            padding: 28px 20px 24px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            margin-top: 5px;
            font-size: 0.88em;
            color: var(--green-light);
        }

        /* ── Layout ──────────────────────────────────────────── */
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        /* ── Message banner ──────────────────────────────────── */
        #message {
            display: none;
            padding: 11px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            margin-bottom: 16px;
        }

        #message.error   { display: block; background: var(--error-bg);   color: var(--error-fg); }
        #message.success { display: block; background: var(--success-bg); color: var(--success-fg); }

        /* ── Top-3 (innkjøpsansvarlig) ───────────────────────── */
        .top3-section {
            background: var(--white);
            border: 2px solid var(--green-primary);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 20px;
        }

        .top3-section h2 {
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--green-primary);
            margin-bottom: 12px;
        }

        .top3-list { display: flex; flex-direction: column; gap: 7px; }

        .top3-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 7px;
        }

        .top3-item.rank-1 { background: #fff8e1; border-left: 3px solid #f9a825; }
        .top3-item.rank-2 { background: #f5f5f5; border-left: 3px solid #9e9e9e; }
        .top3-item.rank-3 { background: #fff3e0; border-left: 3px solid #b87333; }

        .top3-rank  { font-weight: 700; font-size: 1em; min-width: 22px; color: var(--text-muted); }
        .top3-name  { flex: 1; font-weight: 600; font-size: 0.95em; }
        .top3-votes { font-size: 0.82em; font-weight: 700; color: var(--green-primary); white-space: nowrap; }

        .top3-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.88em;
            padding: 6px 0;
        }

        /* ── Input form ──────────────────────────────────────── */
        .form-section {
            background: var(--white);
            padding: 18px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .form-section label {
            display: block;
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 9px;
        }

        .form-group { display: flex; gap: 8px; }

        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid var(--cream-dark);
            border-radius: 7px;
            font-size: 15px;
            background: var(--cream);
            color: var(--text-dark);
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--green-primary);
            background: var(--white);
        }

        button.primary {
            padding: 10px 20px;
            background: var(--green-primary);
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        button.primary:hover  { background: var(--green-dark); }
        button.primary:active { transform: scale(0.97); }

        /* ── Suggestions list ────────────────────────────────── */
        .section-label {
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--green-primary);
            margin-bottom: 10px;
        }

        .suggestions-section { display: flex; flex-direction: column; gap: 8px; }

        .suggestion {
            background: var(--white);
            padding: 14px 16px;
            border-radius: 9px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: box-shadow 0.2s;
        }

        .suggestion:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }

        .suggestion-name {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
        }

        .vote-section { display: flex; align-items: center; gap: 10px; }

        .vote-count {
            font-size: 18px;
            font-weight: 700;
            color: var(--green-primary);
            min-width: 26px;
            text-align: center;
        }

        button.vote-btn {
            padding: 7px 14px;
            background: var(--green-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 68px;
        }

        button.vote-btn:hover   { background: var(--green-dark); }
        button.vote-btn:active  { transform: scale(0.97); }

        button.vote-btn.voted {
            background: #f0f0f0;
            color: #888;
            cursor: pointer;
        }

        button.vote-btn.voted:hover {
            background: #ffe0e0;
            color: #b91c1c;
        }

        button.delete-btn {
            padding: 5px 8px;
            background: transparent;
            color: #ccc;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        button.delete-btn:hover {
            background: var(--error-bg);
            color: var(--error-fg);
        }

        /* ── States ──────────────────────────────────────────── */
        .loading, .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 36px 20px;
            font-size: 15px;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--cream-dark);
            border-top-color: var(--green-primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>Purreløken</h1>
    <p>Lunsjønskeliste for Kravia AS</p>
</header>

<div class="container">
    <div id="message"></div>

    <!-- Topp 3 — for innkjøpsansvarlig -->
    <div class="top3-section">
        <h2>Topp 3 — for innkjøpsansvarlig</h2>
        <div class="top3-list" id="top3List">
            <div class="top3-empty">Laster...</div>
        </div>
    </div>

    <!-- Foreslå matvare -->
    <div class="form-section">
        <label for="foodInput">Foreslå en matvare</label>
        <div class="form-group">
            <input
                type="text"
                id="foodInput"
                placeholder="F.eks. sushi, wraps, pizza..."
                autocomplete="off"
                maxlength="100"
            >
            <button class="primary" id="addBtn" onclick="addSuggestion()">Legg til</button>
        </div>
    </div>

    <!-- Alle forslag -->
    <div class="section-label">Alle forslag</div>
    <div id="suggestions" class="suggestions-section">
        <div class="loading"><span class="spinner"></span>Laster...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const PROJECT_URL = "https://cstcniiidjrcdnkaodym.supabase.co";
    const ANON_KEY    = "sb_publishable_qQmG0CsjmMRNZ4HduPJBKQ_Q9cZOoi2";

    const { createClient } = window.supabase;
    const db = createClient(PROJECT_URL, ANON_KEY);

    let suggestions = [];

    /* ── Data ───────────────────────────────────────────────── */

    async function loadSuggestions() {
        try {
            const { data, error } = await db
                .from('wishes')
                .select('id, product_name, votes')
                .order('votes', { ascending: false });

            if (error) throw error;
            suggestions = data || [];
            renderTop3();
            renderSuggestions();
        } catch (err) {
            showMessage('Kunne ikke laste forslag: ' + err.message, 'error');
        }
    }

    async function addSuggestion() {
        const input = document.getElementById('foodInput');
        const btn   = document.getElementById('addBtn');
        const food  = input.value.trim();

        if (!food) {
            showMessage('Skriv inn en matvare', 'error');
            return;
        }

        btn.disabled = true;
        try {
            const { error } = await db
                .from('wishes')
                .insert({ product_name: food, votes: 0 });

            if (error) throw error;
            input.value = '';
            showMessage('Forslag lagt til!', 'success');
            await loadSuggestions();
        } catch (err) {
            showMessage('Feil: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
        }
    }

    async function vote(id) {
        const s = suggestions.find(x => x.id === id);
        if (!s) return;

        try {
            const { error } = await db
                .from('wishes')
                .update({ votes: s.votes + 1 })
                .eq('id', id);

            if (error) throw error;
            localStorage.setItem('vote_' + id, 'true');
            showMessage('Takk for stemmen!', 'success');
            await loadSuggestions();
        } catch (err) {
            showMessage('Feil ved stemming: ' + err.message, 'error');
        }
    }

    async function unvote(id) {
        const s = suggestions.find(x => x.id === id);
        if (!s) return;

        try {
            const { error } = await db
                .from('wishes')
                .update({ votes: Math.max(0, s.votes - 1) })
                .eq('id', id);

            if (error) throw error;
            localStorage.removeItem('vote_' + id);
            showMessage('Stemme fjernet', 'success');
            await loadSuggestions();
        } catch (err) {
            showMessage('Feil: ' + err.message, 'error');
        }
    }

    async function deleteSuggestion(id) {
        try {
            const { error } = await db
                .from('wishes')
                .delete()
                .eq('id', id);

            if (error) throw error;
            localStorage.removeItem('vote_' + id);
            await loadSuggestions();
        } catch (err) {
            showMessage('Feil ved sletting: ' + err.message, 'error');
        }
    }

    /* ── Render ─────────────────────────────────────────────── */

    function renderTop3() {
        const container = document.getElementById('top3List');
        const top = suggestions.slice(0, 3);

        if (top.length === 0) {
            container.innerHTML = '<div class="top3-empty">Ingen forslag ennå</div>';
            return;
        }

        const ranks   = ['1.', '2.', '3.'];
        const classes = ['rank-1', 'rank-2', 'rank-3'];

        container.innerHTML = top.map((s, i) => `
            <div class="top3-item ${classes[i]}">
                <span class="top3-rank">${ranks[i]}</span>
                <span class="top3-name">${esc(s.product_name)}</span>
                <span class="top3-votes">${s.votes} stemmer</span>
            </div>
        `).join('');
    }

    function renderSuggestions() {
        const container = document.getElementById('suggestions');

        if (suggestions.length === 0) {
            container.innerHTML = '<div class="empty-state">Ingen forslag ennå — vær den første!</div>';
            return;
        }

        container.innerHTML = suggestions.map(s => {
            const hasVoted = localStorage.getItem('vote_' + s.id) === 'true';
            return `
                <div class="suggestion">
                    <div class="suggestion-name">${esc(s.product_name)}</div>
                    <div class="vote-section">
                        <div class="vote-count">${s.votes}</div>
                        <button
                            class="vote-btn${hasVoted ? ' voted' : ''}"
                            onclick="${hasVoted ? `unvote('${s.id}')` : `vote('${s.id}')`}"
                        >${hasVoted ? 'Fjern' : 'Stem'}</button>
                        <button
                            class="delete-btn"
                            onclick="deleteSuggestion('${s.id}')"
                            title="Slett forslag"
                        >×</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    /* ── Helpers ────────────────────────────────────────────── */

    let _msgTimer = null;

    function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = type;
        clearTimeout(_msgTimer);
        _msgTimer = setTimeout(() => {
            el.textContent = '';
            el.className = '';
        }, 3500);
    }

    function esc(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    /* ── Init ───────────────────────────────────────────────── */

    loadSuggestions();
    setInterval(loadSuggestions, 30000);

    document.getElementById('foodInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addSuggestion();
    });
</script>

</body>
</html>
